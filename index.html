<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorite Music</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #141e30, #243b55);
        color: white;
        padding: 40px;
    }

    h1{
        text-align:center;
        margin-bottom:30px;
        font-size:40px;
        color:#00ffd5;
    }

    .music-container{
        max-width:700px;
        margin:auto;
    }

    .music-box{
        background: rgba(255,255,255,0.1);
        padding:20px;
        margin:15px 0;
        border-radius:12px;
        transition:0.3s;
        font-size:22px;
    }

    .music-box:hover{
        background:#00ffd5;
        color:black;
        transform:scale(1.03);
    }
</style>
</head>

<body>

<h1>🎵 My Favorite Music 🎵</h1>

<div class="music-container">

    <div class="music-box">1. Shape of You</div>
    <div class="music-box">2. Blinding Lights</div>
    <div class="music-box">3. Believer</div>
    <div class="music-box">4. Perfect</div>
    <div class="music-box">5. Faded</div>
    <div class="music-box">6. Senorita</div>
    <div class="music-box">7. Let Me Love You</div>
    <div class="music-box">8. Memories</div>
    <div class="music-box">9. Love Me Like You Do</div>
    <div class="music-box">10. Stay</div>

</div>

</body>
</html>
